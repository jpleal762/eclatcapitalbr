<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- App Title & Description -->
    <title>Eclat Capital - Dashboard KPIs</title>
    <meta name="description" content="Dashboard de KPIs Eclat Capital XP - Acompanhe suas metas em tempo real" />
    <meta name="author" content="Eclat Capital" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eclat KPIs" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <!-- PWA Manifest - Gerado dinamicamente para preservar token -->
    <link rel="manifest" id="pwa-manifest" href="/manifest.json" />
    
    <script>
      // Gera manifest dinâmico para preservar token na URL
      (function() {
        const hasToken = window.location.search.includes('token=');
        
        if (hasToken) {
          const manifest = {
            name: "Eclat Capital - Dashboard KPIs",
            short_name: "Eclat KPIs",
            description: "Dashboard de KPIs Eclat Capital XP",
            theme_color: "#1a1a2e",
            background_color: "#1a1a2e",
            display: "standalone",
            orientation: "portrait",
            scope: "/",
            start_url: window.location.pathname + window.location.search,
            icons: [
              { src: "/icons/icon-192x192.png", sizes: "192x192", type: "image/png" },
              { src: "/icons/icon-512x512.png", sizes: "512x512", type: "image/png" },
              { src: "/icons/icon-512x512.png", sizes: "512x512", type: "image/png", purpose: "maskable" }
            ]
          };
          
          const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
          const manifestUrl = URL.createObjectURL(blob);
          document.getElementById('pwa-manifest').setAttribute('href', manifestUrl);
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="Eclat Capital - Dashboard KPIs" />
    <meta property="og:description" content="Dashboard de KPIs Eclat Capital XP - Acompanhe suas metas em tempo real" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@EclatCapital" />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
